.progress-label { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-weight: bold; font-size: 14px; text-shadow: 0 1px 3px #000; }
.counters { display: flex; justify-content: center; gap: 30px; margin-bottom: 16px; flex-wrap: wrap; }
.counter { text-align: center; padding: 10px 20px; border-radius: 6px; min-width: 120px; }
.counter .num { font-size: 32px; font-weight: bold; }
.counter .label { font-size: 11px; color: #aaa; }
.c-red { background: #3a1a1a; border: 1px solid #662222; }
.c-red .num { color: #ff4444; }
.c-yellow { background: #3a3a1a; border: 1px solid #666622; }
.c-yellow .num { color: #ffcc00; }
.c-green { background: #1a3a1a; border: 1px solid #226622; }
.c-green .num { color: #44ff44; }
.c-gray { background: #2a2a2a; border: 1px solid #555; }
.c-gray .num { color: #888; }

.cat-bars { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
.cat-bar { flex: 1; min-width: 140px; max-width: 200px; }
.cat-bar-label { font-size: 11px; color: #aaa; margin-bottom: 2px; }
.cat-bar-track { background: #2a2a3e; height: 14px; border-radius: 3px; overflow: hidden; display: flex; }
.cat-bar-seg { height: 100%; }

/* Filters */
.filters { background: #12122a; border: 1px solid #333; border-radius: 6px; padding: 10px 16px; margin-bottom: 16px; display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
.filters label { cursor: pointer; font-size: 12px; }
.filters input[type="checkbox"] { margin-right: 4px; }
.search-box { background: #1a1a2e; border: 1px solid #444; color: #e0e0e0; padding: 4px 8px; border-radius: 4px; font-family: inherit; font-size: 12px; width: 200px; }

.section { margin-bottom: 20px; }
.collapsible { display: none; }
.collapsible.open { display: block; }
table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 6px; }
th { background: #1e1e3a; color: #00e5ff; padding: 8px 6px; text-align: left; border: 1px solid #333; cursor: pointer; user-select: none; white-space: nowrap; }
th:hover { background: #2a2a4a; }
td { padding: 6px; border: 1px solid #2a2a3e; vertical-align: top; }
tr { background: #1a1a2e; }
tr:nth-child(even) { background: #202040; }
tr.row-red { background: #2e1414 !important; }
tr.row-red:nth-child(even) { background: #331818 !important; }
tr.row-yellow { background: #2e2e14 !important; }
tr.row-yellow:nth-child(even) { background: #333318 !important; }
tr.row-gray { background: #222 !important; }
tr.row-gray:nth-child(even) { background: #282828 !important; }
.loc { color: #888; font-size: 11px; word-break: break-all; }
.detail { color: #bbb; font-size: 11px; }
.status { font-size: 16px; text-align: center; }

.copy-btn { background: #333; border: 1px solid #555; color: #ccc; padding: 2px 6px; border-radius: 3px; cursor: pointer; font-size: 10px; font-family: inherit; }
.copy-btn:hover { background: #444; color: #fff; }

.fix-priority { color: #ff4444; font-weight: bold; min-width: 20px; }

.fix-prompt { background: #1a1a2e; border: 1px solid #333; padding: 6px 8px; border-radius: 4px; font-size: 11px; color: #aaa; margin-top: 4px; cursor: pointer; }

// ═══════════════════════════════════════════════════
// RENDER ENGINE
// ═══════════════════════════════════════════════════

function renderAll() {
  const content = document.getElementById('content');
  content.innerHTML = '';

  let totalRed = 0, totalYellow = 0, totalGreen = 0, totalGray = 0;
  const catStats = {};

  DATA.forEach(cat => {
    let r=0, y=0, g=0, gr=0;
    cat.items.forEach(item => {
      if (item.status === 'red') { r++; totalRed++; }
      else if (item.status === 'yellow') { y++; totalYellow++; }
      else if (item.status === 'green') { g++; totalGreen++; }
      else { gr++; totalGray++; }
    });
    catStats[cat.category] = { r, y, g, gr, total: r+y+g+gr };

    const section = document.createElement('div');
    section.className = 'section';

    const h3 = document.createElement('h3');
    h3.textContent = `CATEGORY ${cat.category}: ${cat.title} (🔴${r} 🟡${y} 🟢${g} ⚫${gr})`;
    h3.className = 'open';
    h3.onclick = () => {
      h3.classList.toggle('open');
      tableDiv.classList.toggle('open');
    };

    const tableDiv = document.createElement('div');
    tableDiv.className = 'collapsible open';

    const table = document.createElement('table');
    table.innerHTML = `<thead><tr>
      <th data-col="element">Element</th>
      <th data-col="location">Location</th>
      <th data-col="criteria">Criteria</th>
      <th data-col="result">Result</th>
      <th data-col="status">Status</th>
      <th data-col="detail">Detail</th>
    </tr></thead>`;

    const tbody = document.createElement('tbody');
    cat.items.forEach(item => {
      const tr = document.createElement('tr');
      tr.className = `audit-row row-${item.status}`;
      tr.dataset.status = item.status;
      tr.dataset.text = `${item.element} ${item.criteria} ${item.result} ${item.detail}`.toLowerCase();

      const statusEmoji = { red: '🔴', yellow: '🟡', green: '🟢', gray: '⚫' }[item.status];
      const fixCell = item.fix
        ? `<br><button class="copy-btn" onclick="copyFix(this, '${item.fix.replace(/'/g, "\\'")}')">📋 Copy fix prompt</button>`
        : '';

      tr.innerHTML = `
        <td>${item.element}</td>
        <td class="loc">${item.location}</td>
        <td>${item.criteria}</td>
        <td>${item.result}</td>
        <td class="status">${statusEmoji}</td>
        <td class="detail">${item.detail}${fixCell}</td>
      `;
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);

    // Sort by header click
    table.querySelectorAll('th').forEach((th, idx) => {
      th.addEventListener('click', () => sortTable(table, idx));
    });

    tableDiv.appendChild(table);
    section.appendChild(h3);
    section.appendChild(tableDiv);
    content.appendChild(section);
  });

  // Dashboard
  const total = totalRed + totalYellow + totalGreen + totalGray;
  const pct = total > 0 ? Math.round((totalGreen / total) * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = pct + '% GOOD';
  document.getElementById('cntRed').textContent = totalRed;
  document.getElementById('cntYellow').textContent = totalYellow;
  document.getElementById('cntGreen').textContent = totalGreen;
  document.getElementById('cntGray').textContent = totalGray;

  // Category bars
  const barsDiv = document.getElementById('catBars');
  barsDiv.innerHTML = '';
  Object.entries(catStats).forEach(([cat, s]) => {
    const catName = DATA.find(d => d.category === cat)?.title || cat;
    const div = document.createElement('div');
    div.className = 'cat-bar';
    const rPct = (s.r/s.total*100).toFixed(0);
    const yPct = (s.y/s.total*100).toFixed(0);
    const gPct = (s.g/s.total*100).toFixed(0);
    const grPct = (s.gr/s.total*100).toFixed(0);
    div.innerHTML = `
      <div class="cat-bar-label">${cat}: ${catName}</div>
      <div class="cat-bar-track">
        <div class="cat-bar-seg" style="width:${gPct}%;background:#44ff44"></div>
        <div class="cat-bar-seg" style="width:${yPct}%;background:#ffcc00"></div>
        <div class="cat-bar-seg" style="width:${rPct}%;background:#ff4444"></div>
        <div class="cat-bar-seg" style="width:${grPct}%;background:#666"></div>
      </div>
    `;
    barsDiv.appendChild(div);
  });

  // Fix list
  renderFixList();
}

function renderFixList() {
  const fixItems = document.getElementById('fixItems');
  fixItems.innerHTML = '';

  const fixes = [];
  DATA.forEach(cat => {
    cat.items.forEach(item => {
      if (item.status === 'red' && item.fix) {
        fixes.push({ element: item.element, location: item.location, fix: item.fix, detail: item.detail });
      }
    });
  });

  // Also add yellow items as lower priority
  DATA.forEach(cat => {
    cat.items.forEach(item => {
      if (item.status === 'yellow') {
        const suggestedFix = `Review: ${item.element} at ${item.location}. Current state: ${item.result}. Consider: ${item.detail}`;
        fixes.push({ element: item.element, location: item.location, fix: suggestedFix, detail: item.detail, isYellow: true });
      }
    });
  });

  if (fixes.length === 0) {
    fixItems.innerHTML = '<div style="padding:10px;color:#44ff44;">No critical fixes needed! 🎉</div>';
    return;
  }

  fixes.forEach((f, i) => {
    const div = document.createElement('div');
    div.className = 'fix-item';
    const priority = f.isYellow ? '🟡' : '🔴';
    div.innerHTML = `
      <div class="fix-priority">${priority} #${i + 1}</div>
      <div class="fix-desc">
        <strong>${f.element}</strong> — <span class="loc">${f.location}</span>
        <div class="fix-prompt" onclick="copyFix(this, '${f.fix.replace(/'/g, "\\'").replace(/\n/g, ' ')}')">${f.fix}</div>
      </div>
    `;
    fixItems.appendChild(div);
  });
}

function copyFix(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.classList.add('copied');
    btn.textContent = '✓ Copied!';
    setTimeout(() => { btn.classList.remove('copied'); btn.textContent = '📋 Copy fix prompt'; }, 2000);
  });
}

function sortTable(table, colIdx) {
  const tbody = table.querySelector('tbody');
  const rows = Array.from(tbody.querySelectorAll('tr'));
  const dir = table.dataset.sortDir === 'asc' ? 'desc' : 'asc';
  table.dataset.sortDir = dir;
  rows.sort((a, b) => {
    const at = a.children[colIdx]?.textContent || '';
    const bt = b.children[colIdx]?.textContent || '';
    return dir === 'asc' ? at.localeCompare(bt) : bt.localeCompare(at);
  });
  rows.forEach(r => tbody.appendChild(r));
}

// Filters
document.querySelectorAll('.filter-cb').forEach(cb => {
  cb.addEventListener('change', applyFilters);
});
document.getElementById('searchBox').addEventListener('input', applyFilters);

function applyFilters() {
  const checked = {};
  document.querySelectorAll('.filter-cb').forEach(cb => {
    checked[cb.dataset.status] = cb.checked;
  });
  const search = document.getElementById('searchBox').value.toLowerCase();

  document.querySelectorAll('.audit-row').forEach(row => {
    const statusOk = checked[row.dataset.status] !== false;
    const searchOk = !search || row.dataset.text.includes(search);
    row.style.display = (statusOk && searchOk) ? '' : 'none';
  });
}

// Init
renderAll();
</script>
